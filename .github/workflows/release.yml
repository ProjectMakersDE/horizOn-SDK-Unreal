name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install semantic-release plugins
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/exec

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release output
        if: steps.semantic.outputs.new_release_published == 'true'
        run: echo "Released version ${{ steps.semantic.outputs.new_release_version }}"

      - name: Trigger changelog sync
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          gh api repos/ProjectMakersDE/horizOn-Changelog/dispatches \
            -f event_type=sync-changelog \
            -f 'client_payload[source]=unreal-sdk'

      - name: Trigger example project update
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          gh api repos/ProjectMakersDE/horizOn-Example-Unreal/dispatches \
            -f event_type=update-sdk \
            -f 'client_payload[version]=${{ steps.semantic.outputs.new_release_version }}'

  build:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create plugin ZIP
        run: |
          cd Plugins
          zip -r ../horizOn-SDK-v${{ needs.release.outputs.version }}.zip HorizonSDK/ \
            -x '*.gitkeep' \
            -x 'HorizonSDK/CHANGELOG.md'

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: horizOn-SDK-v${{ needs.release.outputs.version }}.zip
